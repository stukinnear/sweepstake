services:

  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sweepstake
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sweepstake"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Application (React frontend + FastAPI backend in a single container)
  # ---------------------------------------------------------------------------
  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persist auto-generated Alembic migration files across container restarts.
      # Without this, the DB retains the applied revision ID but the file is gone
      # on the next boot, causing "Can't locate revision" errors.
      - migrations_data:/app/data/db_migrations
    environment:
      # ── Testing / Demo / Development ─────────────────────────────────────────
      # Set to "false" for local HTTP testing — HTTPS_AUTH_ONLY=true adds the
      # Secure flag to cookies, which browsers silently reject over plain HTTP
      # (even though the request succeeds, the cookie is never stored/sent).
      # Set to "true" only when this container is behind a TLS-terminating proxy.
      SERVER_HTTPS_AUTH_ONLY: "false"

      # Set to "true" to load test data on startup (for testing/demo purposes).
      # Don't use this in production.
      SERVER_LOAD_TEST_DATA: "true"

      # ── Database ────────────────────────────────────────────────────────────
      SERVER_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/sweepstake

      # ── FastAPI ─────────────────────────────────────────────────────────────
      # SERVER_ROOT_PATH tells FastAPI its mount prefix (/api) so that the
      # generated OpenAPI schema and Swagger UI use correct URLs.
      SERVER_ROOT_PATH: /api

      # CHANGE THIS before deploying — use a long random string
      SERVER_SECRET_KEY: change-me-in-production-use-a-long-random-string

      # ── Process management ──────────────────────────────────────────────────
      # Rule of thumb for production: (2 × CPU cores) + 1
      GUNICORN_WORKERS: "2"

      # ── Optional ────────────────────────────────────────────────────────────
      # SERVER_SMTP_HOST: ""
      # SERVER_SMTP_PORT: "587"
      # SERVER_SMTP_USERNAME: ""
      # SERVER_SMTP_PASSWORD: ""
      # FOOTBALL_DATA_ORG_API_KEY: ""
      # SENTRY_DSN: ""  # Set to your Sentry DSN to enable error monitoring (backend + frontend)

volumes:
  postgres_data:
  migrations_data:

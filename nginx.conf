user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide nginx version from error pages and headers
    server_tokens off;

    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30s;

    # Mitigate Slowloris: drop connections that don't send headers/body promptly
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Gzip compression for text-based assets
    # gzip_min_length 1024 reduces BREACH attack surface on small responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # Rate-limiting zone for API endpoints (10 req/s per IP, burst 20)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    server {
        listen 80;
        root /var/www/html;
        index index.html;

        # -------------------------------------------------------
        # Vite-hashed static assets — cache forever (immutable)
        # Vite appends a content hash to every asset filename, so
        # it's safe to cache these indefinitely.
        # add_header does NOT inherit across location blocks, so
        # security headers are repeated in every location block.
        # -------------------------------------------------------
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://crests.football-data.org; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
            try_files $uri =404;
        }

        # -------------------------------------------------------
        # Swagger UI / ReDoc — relaxed CSP to allow CDN assets
        # FastAPI's get_swagger_ui_html() loads JS + CSS from
        # cdn.jsdelivr.net and the favicon from fastapi.tiangolo.com.
        # These blocks must appear before the /api/ catch-all so nginx
        # matches them first (longest-prefix wins).
        # -------------------------------------------------------
        location ~ ^/api/(docs|redoc|openapi\.json)$ {
            limit_req zone=api_limit burst=20 nodelay;

            # Strip /api prefix before forwarding so FastAPI routes match (e.g. /docs, /redoc, /openapi.json)
            rewrite ^/api/(.+)$ /$1 break;
            proxy_pass http://127.0.0.1:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header Connection "";

            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            # Relaxed CSP: allow CDN assets required by Swagger UI / ReDoc.
            # 'unsafe-inline' in script-src is needed because FastAPI's
            # get_swagger_ui_html() injects an inline <script> to bootstrap
            # Swagger UI. Acceptable here as this is a developer-only docs page.
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://fastapi.tiangolo.com; connect-src 'self'; font-src 'self' https://cdn.jsdelivr.net; worker-src blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
        }

        # -------------------------------------------------------
        # API proxy — strip the /api prefix and forward to gunicorn
        # Mirrors the Vite dev-server proxy in vite.config.ts.
        # -------------------------------------------------------
        location /api/ {
            # Rate-limit: burst of 20 with no-delay on first 20 queued requests
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://127.0.0.1:8888/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            # Use $remote_addr (direct connection IP) — not the spoofable X-Forwarded-For
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header Connection "";

            # Strip sensitive headers the upstream might echo back
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            # Allow larger uploads and longer streaming responses
            client_max_body_size 16m;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;

            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
        }

        # -------------------------------------------------------
        # Public static images — cache for 30 days
        # These files are not content-hashed, so 30d is a safe TTL.
        # -------------------------------------------------------
        location ~* \.(jpg|jpeg|png|gif|ico|webp)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            try_files $uri =404;
        }

        # -------------------------------------------------------
        # SPA fallback — serve index.html for all unmatched routes
        # so React Router can handle client-side navigation.
        # index.html is intentionally not cached so users always
        # get the latest shell after a deployment.
        # -------------------------------------------------------
        location / {
            add_header Cache-Control "no-cache";
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://crests.football-data.org; connect-src 'self' https://*.sentry.io; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
            try_files $uri /index.html;
        }
    }
}

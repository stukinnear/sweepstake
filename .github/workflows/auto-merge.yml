name: Auto-merge main back to dev

on:
  pull_request:
    types: [closed]
    branches: [main, master]

permissions:
  contents: write

jobs:
  merge-back-to-dev:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main back to dev
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout dev
          git pull origin dev
          git merge --no-ff origin/${{ github.base_ref }} -m "Auto-merge ${{ github.base_ref }} back to dev after PR #${{ github.event.pull_request.number }}"
          git push origin dev

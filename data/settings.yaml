# Application settings
# Priority (highest to lowest): env vars > .env / .env.local > this file
# Env var names match the uppercase field name, e.g. PORT=9000

port: 8888
debug: false
secret_key: "dev-secret-key-for-testing-change-in-production"
# database_url: not set here → falls back to SQLite at data/sweepstake.db
# For PostgreSQL, set DATABASE_URL env var or add database_url to data/.env.local:
#   database_url: "postgresql+asyncpg://postgres:postgres@localhost:5432/sweepstake"

access_token_expire_minutes: 30
refresh_token_expire_days: 7
password_reset_expire_minutes: 30


main_host: "http://localhost:3000"
hosts:
  - "http://localhost:3000"
  - "http://localhost:5173"
https_auth_only: true

db_pool_size: 5
db_max_overflow: 10
db_pool_recycle: 3600

email_host: ""
email_port: 587
email_host_user: ""
email_host_password: ""
email_from: "noreply@example.com"
email_use_tls: true
email_use_ssl: false

# Note: env var for this field is FOOTBALL_DATA_ORG_API_KEY
football_data_org_api_key: ""

load_test_data: false
root_path: ""

# Note: env var for this field is SENTRY_DSN (no value = disabled)
sentry_dsn: ""

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SweepStake</title>
    <meta name="description" content="SweepStake — predict football match results, compete with friends, and follow your tournament standings in real time." />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="light dark" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/logo/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo/favicon-32x32.png" />

    <!-- iOS home screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="/logo/apple-touch-icon.png" />
    <link rel="mask-icon" href="/logo/logo.svg" color="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SweepStake" />

    <!-- Windows tiles -->
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="/logo/android-chrome-192x192.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SweepStake" />
    <meta property="og:description" content="SweepStake — predict football match results, compete with friends, and follow your tournament standings in real time." />
    <meta property="og:image" content="/logo/android-chrome-512x512.png" />

  </head>
  <body class="bg-white text-gray-900 dark:bg-gray-900 dark:text-gray-100">
    <div id="root"></div>
